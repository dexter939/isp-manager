[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:octane]
command=php /var/www/artisan octane:start --server=swoole --host=0.0.0.0 --port=8000 --workers=4 --task-workers=2
directory=/var/www
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/octane.log
stderr_logfile=/var/log/supervisor/octane_err.log
