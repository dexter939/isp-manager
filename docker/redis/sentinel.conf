# Redis Sentinel configuration
# Monitora il master "ispmaster" e gestisce il failover automatico

# Porta Sentinel (default: 26379)
port 26379

# Non eseguire in background (Docker gestisce il processo)
daemonize no

# Log al stdout per Docker logging
logfile ""

# Directory di lavoro
dir /tmp

# ── Monitoraggio master ────────────────────────────────────────────────────
# sentinel monitor <master-name> <master-ip> <master-port> <quorum>
# quorum: numero minimo di Sentinel che devono concordare per dichiarare il master down
sentinel monitor ispmaster redis-master 6379 2

# Autenticazione
sentinel auth-pass ispmaster REDIS_PASSWORD_PLACEHOLDER

# ── Timing ────────────────────────────────────────────────────────────────
# Dopo quanti ms senza risposta il master è considerato S_DOWN
sentinel down-after-milliseconds ispmaster 5000

# Dopo quanti secondi un failover stallo viene dichiarato fallito
sentinel failover-timeout ispmaster 60000

# Quanti replica riconfiguriamo contemporaneamente durante un failover
sentinel parallel-syncs ispmaster 1

# ── Notifiche ──────────────────────────────────────────────────────────────
# sentinel notification-script ispmaster /var/redis/notify.sh

# ── Security ──────────────────────────────────────────────────────────────
# Accetta connessioni solo da reti interne (configurare secondo ambiente)
# bind 0.0.0.0
