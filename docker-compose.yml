version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: ispmanager-app
    container_name: ispmanager-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/app/php.ini:/usr/local/etc/php/conf.d/custom.ini
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - OCTANE_SERVER=swoole
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - ispmanager

  horizon:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: ispmanager-app
    container_name: ispmanager-horizon
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - .:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - ispmanager

  postgres:
    image: postgis/postgis:16-3.4
    container_name: ispmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ispmanager}
      POSTGRES_USER: ${DB_USERNAME:-ispmanager}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ispmanager
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ispmanager} -d ${DB_DATABASE:-ispmanager}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: ispmanager-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secret} --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - ispmanager
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ispmanager-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ispmanager}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-secret123456}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - ispmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio-setup:
    image: minio/mc:latest
    container_name: ispmanager-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-ispmanager} ${MINIO_SECRET_KEY:-secret123456};
      mc mb --ignore-existing local/ispmanager-documents;
      mc mb --ignore-existing local/ispmanager-invoices;
      mc mb --ignore-existing local/ispmanager-contracts;
      mc policy set private local/ispmanager-documents;
      mc policy set private local/ispmanager-invoices;
      mc policy set private local/ispmanager-contracts;
      exit 0;
      "
    networks:
      - ispmanager

  mailpit:
    image: axllent/mailpit:latest
    container_name: ispmanager-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-1025}:1025"
      - "${MAILPIT_DASHBOARD_PORT:-8025}:8025"
    networks:
      - ispmanager

networks:
  ispmanager:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
